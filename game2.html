<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Pointing Game</title>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="game2.css">
</head>
<body>
    <div class="game-container" id="game-container">
        <button id="fullscreen-btn" class="fs-btn" title="Toggle Fullscreen">🔲</button>
        <button onclick="location.reload()" class="refresh-btn" title="Refresh Page">🔄</button>
        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="instructions">👉 ชูนิ้ว (0-5) เพื่อปรับมุมปืนใหญ่ แล้วแบมือ (5 นิ้ว) เพื่อยิง!</div>
            <div id="score-display">คะแนน: <span id="score">0</span></div>
            <div id="timer-bar-container">
                <div id="timer-bar"></div>
            </div>
        </div>
        
        <div id="finger-display" style="position: absolute; bottom: 20px; left: 20px; text-align: left; font-size: 100px; color: #f1c40f; font-weight: bold; text-shadow: 4px 4px 10px rgba(0,0,0,0.8); z-index: 100;">0</div>
        <div id="hand-side-display" style="position: absolute; top: 110px; left: 15px; font-size: 20px; color: #2ecc71; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 100;">🖐️ ด้าน: -</div>

        <div class="video-wrapper">
            <video class="input_video" playsinline></video>
            <canvas class="output_canvas" width="640" height="480"></canvas>
            
            <!-- เอฟเฟกต์ทำโทษ -->
            <div id="punish-overlay">
                <div class="punish-emoji">😭</div>
                <div class="punish-text">ผิดข้อแล้ว! 💧</div>
                <div class="punish-answer" id="correct-answer-display" style="font-size: 50px; color: #f1c40f; margin-top: 20px; font-weight: bold; text-shadow: 3px 3px 0 #2980b9, -1px -1px 0 #2980b9, 1px -1px 0 #2980b9, -1px 1px 0 #2980b9, 1px 1px 0 #2980b9;">เฉลย: </div>
            </div>
            
            <!-- เอฟเฟกต์ยินดี -->
            <div id="success-overlay">
                <div class="success-emoji">✨🎉✨</div>
                <div class="success-text">เก่งมาก! +10</div>
            </div>
        </div>
        
        <div id="loading">กำลังโหลดโมเดล AI นิ้วมือ... กรุณากดอนุญาตกล้อง</div>
    </div>

    <script src="game2-logic.js"></script>
    <script>
        const fsBtn = document.getElementById('fullscreen-btn');
        if (fsBtn) {
            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });
        }
    </script>
</body>
</html>

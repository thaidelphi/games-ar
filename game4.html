<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Vocabulary Game</title>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="game4.css">
</head>
<body>
    <!-- Start Overlay for Audio Unlock -->
    <div id="start-overlay" style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; cursor: pointer; backdrop-filter: blur(5px);">
        <div style="background: linear-gradient(135deg, #f39c12, #e67e22); color: white; padding: 20px 50px; border-radius: 30px; font-size: 35px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); box-shadow: 0 10px 20px rgba(0,0,0,0.5); animation: pulse 1.5s infinite;">
            👆 แตะที่นี่เพื่อเริ่มเกม
        </div>
    </div>
    
    <div class="game-container" id="game-container">
        <button id="fullscreen-btn" class="fs-btn" title="Toggle Fullscreen">🔲</button>
        <button onclick="location.reload()" class="refresh-btn" title="Refresh Page">🔄</button>
        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="instructions">👉 ใช้นิ้วชี้แตะกล่องคำตอบ หรือชูนิ้ว 1, 2, 3 เพื่อเลือกรูปผลไม้ให้ตรงกับคำศัพท์!</div>
            <div id="score-display">คะแนน: <span id="score">0</span></div>
            <div id="finger-display" style="position: absolute; bottom: 20px; left: 20px; text-align: left; font-size: 100px; color: #f1c40f; font-weight: bold; text-shadow: 4px 4px 10px rgba(0,0,0,0.8); z-index: 100;">0</div>
            <div id="timer-bar-container">
                <div id="timer-bar"></div>
            </div>
            <div id="hand-side-display" style="position: absolute; top: 110px; left: 15px; font-size: 20px; color: #2ecc71; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 100;">🖐️ ด้าน: -</div>
        </div>

        <div class="video-wrapper">
            <video class="input_video" playsinline></video>
            <!-- Canvas สำหรับวาดเกม -->
            <canvas class="output_canvas" width="640" height="480"></canvas>
            
            <!-- เอฟเฟกต์ทำโทษ -->
            <div id="punish-overlay">
                <div class="punish-emoji">😭</div>
                <div class="punish-text">ผิดตัวแล้ว! 💧</div>
                <div class="punish-answer" id="correct-answer-display" style="font-size: 70px; color: #f1c40f; margin-top: 20px; font-weight: bold; text-shadow: 3px 3px 0 #2980b9, -1px -1px 0 #2980b9, 1px -1px 0 #2980b9, -1px 1px 0 #2980b9, 1px 1px 0 #2980b9;">เฉลย: </div>
            </div>

            <!-- เอฟเฟกต์ยินดี -->
            <div id="success-overlay">
                <div class="success-emoji">✨🎉✨</div>
                <div class="success-text">เก่งมาก! +10</div>
            </div>
        </div>
        
        <div id="loading">กำลังโหลด AI จับนิ้วมือ... กรุณาเปิดกล้อง</div>
    </div>

    <script src="game4-logic.js"></script>
    <script>
        const fsBtn = document.getElementById('fullscreen-btn');
        if (fsBtn) {
            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });
        }
    </script>
</body>
</html>

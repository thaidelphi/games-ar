<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Catching Game</title>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="game5.css">
</head>
<body>
    <div class="game-container">
        <button id="fullscreen-btn" class="fs-btn" title="Toggle Fullscreen">🔲</button>
        <button onclick="location.reload()" class="refresh-btn" title="Refresh Page">🔄</button>
        <!-- UI Overlay: แยกออกมาจาก Canvas เพื่อให้ตัวหนังสือไม่กลับด้านตอนเป็นกระจกเงา -->
        <div id="ui-layer">
            <div id="score-display">คะแนน: <span id="score">0</span></div>
            <div id="instructions">ยกมือขึ้นมาเป็น 🧺 ตะกร้าเพื่อรอรับผลไม้ที่กำลังหล่น!</div>
        </div>

        <div class="video-wrapper">
            <video class="input_video" playsinline></video>
            <canvas class="output_canvas" width="640" height="480"></canvas>
        </div>
        
        <div id="loading">กำลังโหลดโมเดล AI ตรวจจับฝ่ามือ กรุณารอสักครู่...</div>
    </div>

    <script src="game5-logic.js"></script>
    <script>
        const fsBtn = document.getElementById('fullscreen-btn');
        if (fsBtn) {
            fsBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen();
                }
            });
        }
    </script>
</body>
</html>
